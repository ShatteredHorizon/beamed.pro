<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beamed.pro</title>
  <meta name="description" content="Premium Minecraft alt accounts." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a;
      --surface: #131319;
      --border: #1e1e28;
      --text: #ededf0;
      --muted: #888;
      --green: #22c55e;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 40px 24px;
    }

    .header {
      padding: 40px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--green);
    }
    .header p {
      font-size: .875rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      text-align: center;
    }
    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card p {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 8px;
      transition: opacity .15s;
      font-family: inherit;
    }
    .btn:hover { opacity: .85; text-decoration: none; }

    .links {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: .875rem;
    }
    .links a { color: var(--muted); }

    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>beamed.pro</h1>
      <p>Premium Minecraft alt accounts</p>
    </div>

    <div class="card">
      <h2>Buy an account here</h2>
      <p>Instant delivery after payment. Hypixel unbanned, MFA, capes, and more.</p>
      <a href="https://beamed-pro.mysellauth.com" target="_blank" class="btn">Buy an account here &rarr;</a>
    </div>

    <div class="links">
      <a href="https://beamed-pro.mysellauth.com" target="_blank">Shop all accounts &rarr;</a>
      <a href="#">Discord</a>
      <a href="#">FAQ</a>
    </div>

    <div class="footer">
      &copy; 2026 beamed.pro
    </div>
  </div>
</body>
</html>
